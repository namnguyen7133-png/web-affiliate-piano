<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Piano Affiliate Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>.line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }</style>
</head>
<body class="bg-gray-100 p-4 md:p-10">
    <div class="max-w-7xl mx-auto">
        <h1 class="text-3xl font-bold text-center mb-10 text-gray-800 uppercase">Danh Sách Piano Ưu Đãi</h1>
        <div id="product-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6"></div>
    </div>

    <script>
        Papa.parse("data.csv", {
            download: true,
            header: true, // Chế độ này sẽ tự tìm theo tên cột bạn đã đặt
            skipEmptyLines: true,
            complete: function(results) {
                const data = results.data;
                const grid = document.getElementById('product-grid');
                
                data.forEach(row => {
                    // Lấy dữ liệu dựa trên tiêu đề cột bạn đã gửi
                    const title = row[""] || "Sản phẩm Piano"; 
                    const price = row["price"] || "Liên hệ";
                    const img = row["ItemCard__image src"] || "";
                    const link = row["Link_Affiliate"] || "#";

                    if(img) {
                        grid.innerHTML += `
                            <div class="bg-white rounded-2xl shadow-sm hover:shadow-xl transition-all duration-300 flex flex-col border border-gray-200 overflow-hidden">
                                <div class="h-52 bg-white">
                                    <img src="${img}" class="w-full h-full object-contain p-2" onerror="this.src='https://via.placeholder.com/300'">
                                </div>
                                <div class="p-4 flex flex-col flex-grow">
                                    <h2 class="text-sm font-bold text-gray-700 h-10 line-clamp-2 mb-2">${title}</h2>
                                    <p class="text-red-500 font-extrabold text-xl mb-4">${price}đ</p>
                                    <a href="${link}" target="_blank" class="mt-auto block w-full text-center bg-orange-500 hover:bg-orange-600 text-white font-bold py-3 rounded-xl transition-all shadow-md">MUA NGAY</a>
                                </div>
                            </div>`;
                    }
                });
            }
        });
    </script>
</body>
</html>
